<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Inventario</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
</head>
<body>
    <h2>Bitácora de Equipos</h2>
    <table id="miInventario" class="display" style="width:100%">
        <thead>
            <tr>
                <th>Equipo</th><th>Marca</th><th>Modelo</th><th>Estado</th><th>Asignado</th>
            </tr>
        </thead>
    </table>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    
    <script>
        $(document).ready(function() {
            $('#miInventario').DataTable({
                "ajax": {
                    "url": "inventario.json",
                    "dataSrc": ""
                },
                "columns": [
                    { "data": "EQUIPO" },
                    { "data": "MARCA" },
                    { "data": "MODELO" },
                    { "data": "ACTIVO/INACTIVO" },
                    { "data": "ASIGNADO A" }
                ]
            });
        });
    </script>
</body>
</html>
