<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario APSORAD</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .logo { display: block; margin: 0 auto 20px; width: 200px; }
    </style>
</head>
<body>
    <img src="logo1.jpg" alt="Logo APSORAD" class="logo">
    <h2>Inventario de Equipos</h2>
    <table id="miInventario" class="display" style="width:100%">
        <thead>
            <tr>
                <th>ID</th>
                <th>Equipo</th>
                <th>Marca</th>
                <th>Modelo</th>
                <th>Asignado</th>
            </tr>
        </thead>
    </table>
    <script>
        $(document).ready(function() {
            // PEGA AQUÍ TU URL DE GOOGLE SHEETS PUBLICADA
            const csvUrl = 'TU_URL_CSV_AQUI'; 

            Papa.parse(csvUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    $('#miInventario').DataTable({
                        data: results.data,
                        columns: [
                            { data: "IDENTIFICACION", render: function(data) {
                                return '<a href="equipo.html?id=' + encodeURIComponent(data) + '">' + data + '</a>';
                            }},
                            { data: "EQUIPO" },
                            { data: "MARCA" },
                            { data: "MODELO" },
                            { data: "ASIGNADO" }
                        ]
                    });
                }
            });
        });
    </script>
</body>
</html>
