<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Inventario APSORAD</title>
</head>
<body>
    <h2>Inventario</h2>
    <div id="resultado">Cargando datos...</div>

    <script>
        fetch('inventario.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('resultado').innerHTML = JSON.stringify(data, null, 2);
            })
            .catch(error => {
                document.getElementById('resultado').innerHTML = "Error al leer el JSON: " + error;
                console.log(error);
            });
    </script>
</body>
</html>
