<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ficha Técnica</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .container { background: white; max-width: 600px; margin: auto; padding: 20px; border-radius: 10px; }
        .logo { display: block; margin: 0 auto 20px; width: 150px; }
    </style>
</head>
<body>
<div class="container">
    <img src="logo1.jpg" alt="Logo APSORAD" class="logo">
    <div id="detalle">Cargando información...</div>
</div>
<script>
    const params = new URLSearchParams(window.location.search);
    const idBuscado = params.get('id');
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQJYf9abN7jDMI-SXS_eV0c3RPuXomqEyTAj2z8ZEN7FPxyEJjR2GdYIrd7Iv1eGL613lSV0CjXi_P/pub?output=csv'; // PEGA AQUÍ LA MISMA URL

    Papa.parse(csvUrl, {
        download: true,
        header: true,
        complete: function(results) {
            const equipo = results.data.find(e => e.IDENTIFICACION === idBuscado);
            if (equipo) {
                document.getElementById('detalle').innerHTML = `
                    <h1>${equipo.EQUIPO}</h1>
                    <p><b>ID:</b> ${equipo.IDENTIFICACION}</p>
                    <p><b>Marca:</b> ${equipo.MARCA}</p>
                    <p><b>Asignado:</b> ${equipo.ASIGNADO}</p>
                    <p><b>Monitores:</b> ${equipo.MONITORES}</p>
                    <p><b>Teclado y Mouse:</b> ${equipo["TECLADO Y MOUSE"]}</p>
                    <a href="index.html">← Volver</a>
                `;
            } else {
                document.getElementById('detalle').innerHTML = "<h1>Error</h1><p>Equipo no encontrado.</p><a href='index.html'>Volver</a>";
            }
        }
    });
</script>
</body>
</html>
