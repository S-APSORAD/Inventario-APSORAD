<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario APSORAD</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
</head>
<body>
    <h2>Inventario de Equipos</h2>
    <table id="miInventario" class="display" style="width:100%">
        <thead>
            <tr>
                <th>ID</th>
                <th>Equipo</th>
                <th>Marca</th>
                <th>Modelo</th>
                <th>Asignado</th>
            </tr>
        </thead>
    </table>

    <script>
        $(document).ready(function() {
            $('#miInventario').DataTable({
                "ajax": { 
                    "url": "inventario.json", 
                    "dataSrc": "" 
                },
                "columns": [
                    { 
                        "data": "IDENTIFICACION",
                        "render": function(data, type, row) {
                            return '<a href="equipo.html?id=' + encodeURIComponent(data) + '">' + data + '</a>';
                        }
                    },
                    { "data": "EQUIPO" },
                    { "data": "MARCA" },
                    { "data": "MODELO" },
                    { "data": "ASIGNADO" }
                ]
            });
        });
    </script>
</body>
</html>
