<script>
    $(document).ready(function() {
        $('#miInventario').DataTable({
            "ajax": {
                "url": "inventario.csv",
                "dataType": "text",
                "dataSrc": function(data) {
                    var lines = data.split('\n');
                    var result = [];
                    for(var i = 1; i < lines.length; i++) {
                        var cols = lines[i].split(',');
                        if(cols.length > 1) {
                            result.push({
                                "Equipo": cols[0], "Marca": cols[1], "Modelo": cols[2],
                                "SN": cols[3], "Telefono": cols[4], "Caracteristicas": cols[5],
                                "Estado": cols[6], "Asignado": cols[7], "Obs": cols[8], "Historial": cols[9]
                            });
                        }
                    }
                    return result;
                }
            },
            "columns": [
                { "data": "Equipo" }, { "data": "Marca" }, { "data": "Modelo" },
                { "data": "SN" }, { "data": "Telefono" }, { "data": "Caracteristicas" },
                { "data": "Estado" }, { "data": "Asignado" }, { "data": "Obs" }, { "data": "Historial" }
            ]
        });
    });
</script>
