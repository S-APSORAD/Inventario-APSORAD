<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario APSORAD</title>
</head>
<body>
    <h1>Inventario APSORAD</h1>
    <div id="debug">Cargando...</div>

    <script>
        // Intentamos cargar el JSON directamente
        fetch('inventario.json')
            .then(response => {
                if (!response.ok) throw new Error("No se pudo cargar el archivo");
                return response.json();
            })
            .then(data => {
                document.getElementById('debug').innerHTML = "JSON cargado correctamente: " + JSON.stringify(data);
            })
            .catch(err => {
                document.getElementById('debug').innerHTML = "ERROR: " + err.message;
            });
    </script>
</body>
</html>
