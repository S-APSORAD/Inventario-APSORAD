<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario APSORAD</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
</head>
<body>

    <h2>Inventario de Equipos</h2>
    <table id="miInventario" class="display" style="width:100%">
        <thead>
            <tr>
                <th>ID</th>
                <th>Equipo</th>
                <th>Marca</th>
                <th>Modelo</th>
                <th>Asignado</th>
            </tr>
        </thead>
    </table>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>

    <script>
        $(document).ready(function() {
            $('#miInventario').DataTable({
                "ajax": {
                    "url": "inventario.json",
                    "dataSrc": ""
                },
                "columns": [
                    { "data": "ID" },
                    { "data": "EQUIPO" },
                    { "data": "MARCA" },
                    { "data": "MODELO" },
                    { "data": "ASIGNADO" }
                ]
            });
        });
    </script>
</body>
</html>
