<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ficha Técnica</title>
</head>
<body>
    <div id="detalle">Buscando equipo...</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const idBuscado = urlParams.get('id');

        fetch('inventario.json')
            .then(res => res.json())
            .then(data => {
                console.log("ID buscado:", idBuscado);
                console.log("Datos cargados:", data);
                
                // Buscamos coincidencia exacta
                const equipo = data.find(e => e.ID === idBuscado);
                
                if (equipo) {
                    document.getElementById('detalle').innerHTML = `
                        <h1>${equipo.EQUIPO}</h1>
                        <p><b>ID:</b> ${equipo.ID}</p>
                        <p><b>Estado:</b> ${equipo.ACTIVO}</p>
                        <a href="index.html">Volver</a>
                    `;
                } else {
                    document.getElementById('detalle').innerHTML = `
                        <h1>Error</h1>
                        <p>No se encontró el equipo con ID: <b>${idBuscado}</b></p>
                        <a href="index.html">Volver al Inventario</a>
                    `;
                }
            })
            .catch(err => {
                document.getElementById('detalle').innerHTML = "Error al cargar el JSON.";
            });
    </script>
</body>
</html>
